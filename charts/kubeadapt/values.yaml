# Global values for kubeadapt.
global:
  name: "kubeadapt"
  nameOverride: ""
  fullnameOverride: ""

agent:
  enabled: true
  image:
    # renovate: datasource=docker depName=public.ecr.aws/w3l5x6r6/kubeadapt/app/kubeadapt-agent
    repository: public.ecr.aws/w3l5x6r6/kubeadapt/app/kubeadapt-agent
    tag: "v2.0.0" # Defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent
  # ============================================================
  # Service Account Configuration
  # ============================================================
  # Service account for agent pod
  serviceAccount:
    # Create a service account for the agent
    create: true
    # Annotations for the service account
    # Example:
    #   custom-annotation: value
    annotations: {}
    # Override the service account name (default: kubeadapt-agent)
    name: ""
  rbac:
    create: true
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # ============================================================
  # Agent Configuration
  # ============================================================
  config:
    # ============================================================
    # Authentication & Backend Configuration
    # ============================================================
    # Token for authenticating with the Kubeadapt backend.
    # This is provided when you create a cluster in the Kubeadapt platform.
    token: ""

    # Backend API endpoint
    backendUrl: "https://agent.kubeadapt.io"

    # ============================================================
    # Collection Settings
    # ============================================================
    # How often agent collects cluster state snapshots (Go duration or seconds).
    # Min: 10s. Recommended: 60s.
    snapshotInterval: "60s"

    # How often agent collects resource metrics (Go duration or seconds).
    # Min: 10s. Recommended: 60s.
    metricsInterval: "60s"

    # Kubernetes informer resync period (Go duration or seconds).
    informerResync: "300s"

    # ============================================================
    # Data Compression Settings
    # ============================================================
    # Compression level for data sent to backend (1-4).
    # 1=fastest/least compression, 4=slowest/best compression
    # Recommended: 3 (good balance of speed and compression ratio)
    compressionLevel: 3

    # ============================================================
    # HTTP Client Settings
    # ============================================================
    # Max retry attempts for failed backend requests.
    maxRetries: 5

    # Timeout for HTTP requests to backend (Go duration or seconds).
    requestTimeout: "30s"

    # Max buffer size in bytes (default: 50 MB).
    bufferMaxBytes: "52428800"

    # ============================================================
    # Observability & Debugging
    # ============================================================
    # HTTP port for health check and metrics endpoint
    # Exposes /healthz, /readyz, /metrics endpoints
    healthPort: 8080

    # Enable pprof/debug endpoints on health port
    # WARNING: Only enable for troubleshooting
    debugEndpoints: false

    # ============================================================
    # GPU Metrics (Optional)
    # ============================================================
    # Enable GPU metrics collection from DCGM exporter
    # Requires DCGM exporter to be running in cluster (e.g., via gpu-operator)
    # Collects: GPU utilization, memory usage
    gpuMetricsEnabled: true

    # DCGM exporter port (default: 9400)
    dcgmPort: 9400

    # DCGM exporter namespace (auto-detect if empty)
    dcgmNamespace: ""

    # DCGM exporter endpoints override (comma-separated IPs/hosts)
    # Use this if kubeadapt auto-discovery fails to find DCGM exporter pods.
    # Example: "10.0.1.5,10.0.2.3"
    dcgmEndpoints: ""

    # ============================================================
    # Runtime Performance Tuning
    # ============================================================
    # GOMAXPROCS value (auto-tuned if not set)
    # goMaxProcs: 4

    # GOMEMLIMIT value (auto-tuned if not set)
    # goMemLimit: "900MiB"

  # ============================================================
  # Auto-Upgrade Configuration
  # ============================================================
  # Enables automatic chart upgrades when new versions are available.
  # The agent checks for updates periodically and spawns a Helm upgrade Job.
  autoUpgrade:
    # Enable/disable auto-upgrade feature
    enabled: false

    # Upgrader sidecar image
    image:
      # renovate: datasource=docker depName=public.ecr.aws/w3l5x6r6/kubeadapt/app/kubeadapt-upgrader
      repository: public.ecr.aws/w3l5x6r6/kubeadapt/app/kubeadapt-upgrader
      tag: "" # Defaults to .Chart.AppVersion
      pullPolicy: IfNotPresent

    # Resource limits for the upgrader sidecar
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

    # How often to check for updates
    # Recommended: 6h for production, 1h for testing
    checkInterval: "6h"

    # Upgrade policy - controls which versions to upgrade to
    # Options:
    #   - "minor": Upgrade minor and patch versions (0.17.x -> 0.18.x) - DEFAULT
    #   - "patch": Only upgrade patch versions (0.17.0 -> 0.17.1)
    #   - "all": Upgrade all versions including major (breaking changes)
    policy: "minor"

    # Release channel
    # Options:
    #   - "stable": Production-ready releases (recommended)
    #   - "fast": Early access releases (may have bugs)
    channel: "stable"

    # Upgrade timeout - how long to wait for helm upgrade to complete
    timeout: "15m"

    # Helm image for upgrade Job
    # Contains helm binary for performing upgrades
    jobImage: "alpine/helm:3.14.3"

    # Chart repository URL for Helm upgrades
    # Leave empty to use the default OCI registry (production default)
    # Set to HTTP URL for testing: http://chartmuseum:8080
    chartRepo: ""

    # Initial delay before the first upgrade check
    # Default: 1m — matches production behavior
    # Set to 5s for faster tests
    initialDelay: "1m"

    # Dry-run mode — detects updates and logs them but does NOT create a Helm upgrade Job.
    # Useful for validating upgrade logic without performing actual upgrades.
    # Default: false
    dryRun: false

    # Service account for upgrade Job
    # The Job needs permissions to manage Helm releases (secrets/configmaps)
    # and update all KubeAdapt resources during upgrade
    serviceAccount:
      create: true
      annotations: {}
      name: ""

    # RBAC for upgrade ServiceAccount
    # Permissions needed to perform helm upgrade operations
    rbac:
      create: true
  # ============================================================
  # Additional Environment Variables
  # ============================================================
  # Custom environment variables to inject into agent pod
  # Use this for advanced configuration or cloud-specific settings
  env: []

  tolerations: []

  nodeSelector: {}

  affinity: {}

  topologySpreadConstraints: []

# ============================================================
# eBPF Agent Configuration (Network Cost Tracking)
# ============================================================
# Deploys a DaemonSet that uses eBPF to track pod-to-pod network traffic
#
# Prerequisites:
# - Linux kernel >= 5.8 (required for TC eBPF support)
# - Privileged container access
#
# For full configuration options, see: charts/ebpf-agent/values.yaml
ebpf-agent:
  # Set to true to deploy the eBPF agent DaemonSet for network cost tracking
  enabled: false

  # Override defaults if needed - see charts/ebpf-agent/values.yaml for all options
  # config:
  #   logLevel: "info"
  #   collectionInterval: "25s"

  # Scheduling - configure as needed for your cluster
  tolerations: []

  nodeSelector: {}

  affinity: {}

  topologySpreadConstraints: []
