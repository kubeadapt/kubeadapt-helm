# CI test values for kubeadapt chart
global:
  name: "kubeadapt"
  nameOverride: ""
  fullnameOverride: ""

agent:
  enabled: true
  image:
    repository: public.ecr.aws/w3l5x6r6/kubeadapt/app/kubeadapt-agent
    tag: "v2.0.0"
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  rbac:
    create: true
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  config:
    token: "ci-test-key-123"
    backendUrl: ""
    clusterName: "ci-test-cluster"
    snapshotInterval: "60s"
    metricsInterval: "60s"
    informerResync: "300s"
    compressionLevel: 3
    maxRetries: 3
    requestTimeout: "30s"
    bufferMaxBytes: 52428800
    healthPort: 8080
    debugEndpoints: false
    gpuMetricsEnabled: true
    dcgmPort: 9400
    dcgmNamespace: ""
  env: []
