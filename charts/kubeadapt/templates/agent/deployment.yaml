{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeadapt.name" . }}-agent
  labels:
    {{- include "kubeadapt.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "kubeadapt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        {{- include "kubeadapt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: {{ include "kubeadapt.name" . }}-agent
      containers:
        - name: agent
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          ports:
            - name: health
              containerPort: {{ .Values.agent.config.healthPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            # Kubernetes metadata (injected via Downward API)
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

            # Chart Version (injected from Helm chart)
            - name: KUBEADAPT_CHART_VERSION
              value: {{ .Chart.Version | quote }}

            # Backend API Configuration
            - name: KUBEADAPT_BACKEND_URL
              value: {{ .Values.agent.config.backendUrl | quote }}
            - name: KUBEADAPT_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agent.config.existingSecret | default (printf "%s-agent" (include "kubeadapt.name" .)) }}
                  key: token

            # Collection Settings
            - name: KUBEADAPT_SNAPSHOT_INTERVAL
              value: {{ .Values.agent.config.snapshotInterval | quote }}
            - name: KUBEADAPT_METRICS_INTERVAL
              value: {{ .Values.agent.config.metricsInterval | quote }}
            - name: KUBEADAPT_INFORMER_RESYNC
              value: {{ .Values.agent.config.informerResync | quote }}

            # Compression
            - name: KUBEADAPT_COMPRESSION_LEVEL
              value: {{ .Values.agent.config.compressionLevel | quote }}

            # HTTP Client Settings
            - name: KUBEADAPT_MAX_RETRIES
              value: {{ .Values.agent.config.maxRetries | quote }}
            - name: KUBEADAPT_REQUEST_TIMEOUT
              value: {{ .Values.agent.config.requestTimeout | quote }}
            - name: KUBEADAPT_BUFFER_MAX_BYTES
              value: {{ .Values.agent.config.bufferMaxBytes | quote }}

            # Observability & Debugging
            - name: KUBEADAPT_HEALTH_PORT
              value: {{ .Values.agent.config.healthPort | quote }}
            - name: KUBEADAPT_DEBUG_ENDPOINTS
              value: {{ .Values.agent.config.debugEndpoints | quote }}

            # GPU Metrics (Optional)
            - name: KUBEADAPT_GPU_METRICS_ENABLED
              value: {{ .Values.agent.config.gpuMetricsEnabled | quote }}
            {{- if .Values.agent.config.dcgmPort }}
            - name: KUBEADAPT_DCGM_PORT
              value: {{ .Values.agent.config.dcgmPort | quote }}
            {{- end }}
            {{- if .Values.agent.config.dcgmNamespace }}
            - name: KUBEADAPT_DCGM_NAMESPACE
              value: {{ .Values.agent.config.dcgmNamespace | quote }}
            {{- end }}
            {{- if .Values.agent.config.dcgmEndpoints }}
            - name: KUBEADAPT_DCGM_ENDPOINTS
              value: {{ .Values.agent.config.dcgmEndpoints | quote }}
            {{- end }}

            # Helm Release Name (for health reporting)
            - name: HELM_RELEASE_NAME
              value: {{ .Release.Name | quote }}

            {{- if .Values.agent.env }}
            # Additional custom environment variables
            {{- toYaml .Values.agent.env | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
      {{- if .Values.agent.autoUpgrade.enabled }}
        - name: upgrader
          image: "{{ .Values.agent.autoUpgrade.image.repository }}:{{ .Values.agent.autoUpgrade.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.agent.autoUpgrade.image.pullPolicy }}
          ports:
            - name: upgrader-health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: upgrader-health
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: upgrader-health
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            # Required: Backend API endpoint (ingestion-api)
            - name: KUBEADAPT_BACKEND_URL
              value: {{ .Values.agent.config.backendUrl | quote }}
            - name: KUBEADAPT_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agent.config.existingSecret | default (printf "%s-agent" (include "kubeadapt.name" .)) }}
                  key: token

            # Pod identity (Downward API)
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

            # Version and release info
            - name: KUBEADAPT_CHART_VERSION
              value: {{ .Chart.Version | quote }}
            - name: HELM_RELEASE_NAME
              value: {{ .Release.Name | quote }}

            # Upgrade settings
            - name: KUBEADAPT_UPGRADE_ENABLED
              value: "true"
            - name: KUBEADAPT_UPGRADE_CHECK_INTERVAL
              value: {{ .Values.agent.autoUpgrade.checkInterval | quote }}
            - name: KUBEADAPT_UPGRADE_POLICY
              value: {{ .Values.agent.autoUpgrade.policy | quote }}
            - name: KUBEADAPT_UPGRADE_CHANNEL
              value: {{ .Values.agent.autoUpgrade.channel | quote }}
            - name: KUBEADAPT_UPGRADE_TIMEOUT
              value: {{ .Values.agent.autoUpgrade.timeout | quote }}
            - name: KUBEADAPT_UPGRADE_JOB_IMAGE
              value: {{ .Values.agent.autoUpgrade.jobImage | quote }}
            - name: KUBEADAPT_UPGRADE_INITIAL_DELAY
              value: {{ .Values.agent.autoUpgrade.initialDelay | quote }}
            - name: KUBEADAPT_UPGRADE_DRY_RUN
              value: {{ .Values.agent.autoUpgrade.dryRun | quote }}
            {{- if .Values.agent.autoUpgrade.chartRepo }}
            - name: KUBEADAPT_UPGRADE_CHART_REPO
              value: {{ .Values.agent.autoUpgrade.chartRepo | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.agent.autoUpgrade.resources | nindent 12 }}
      {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
