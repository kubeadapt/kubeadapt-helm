apiVersion: v2
name: kubeadapt
description: A Helm chart for Kubeadapt
type: application
version: 0.18.0
appVersion: "0.1.0"

# Dependencies
dependencies:
  - name: ebpf-agent
    version: "0.2.0"
    repository: "oci://ghcr.io/kubeadapt/kubeadapt-helm"
    condition: ebpf-agent.enabled

maintainers:
  - name: "ugurcancaykara"
    email: "ugurcan@kubeadapt.io"
  - name: "Kubeadapt"
    email: "authors@kubeadapt.io"

keywords:
  - kubernetes
  - resource optimization
  - cost optimization
  - monitoring
  - cloud native
  - multi-cloud

# Additional metadata
annotations:
  artifacthub.io/signKey: |
    fingerprint: 3C8109B607AD3E119B7033D8948AD9EDA6BD626E
    url: https://kubeadapt.github.io/kubeadapt-helm/pgp_keys.asc
  artifacthub.io/changes: |
    - kind: removed
      description: "Removed prometheus, opencost, and gpu-operator dependencies"
    - kind: changed
      description: "Agent now uses Kubernetes API directly via kubeadapt-agent (no Prometheus required)"
    - kind: changed
      description: "Simplified chart configuration and reduced values.yaml surface area"
    - kind: changed
      description: "Updated RBAC to support kubeadapt-agent resource requirements"
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/prerelease: "true"
  artifacthub.io/license: Apache-2.0
  artifacthub.io/platforms: |
    - eks
    - aks
    - gke
    - on-premise
  artifacthub.io/compatibility: |
    kubernetes:
      platforms:
        eks:
          versions: ["1.24-1.35"]
          tested: true
        aks:
          versions: ["1.24-1.35"]
          tested: true
        gke:
          versions: ["1.24-1.35"]
          tested: true
        on-premise:
          versions: ["1.24-1.35"]
          tested: true
  artifacthub.io/links: |
    - name: Documentation
      url: https://github.com/kubeadapt/kubeadapt-helm/blob/main/README.md
    - name: Compatibility Matrix
      url: https://github.com/kubeadapt/kubeadapt-helm/blob/main/COMPATIBILITY.md
    - name: Security Policy
      url: https://github.com/kubeadapt/kubeadapt-helm/blob/main/SECURITY.md
