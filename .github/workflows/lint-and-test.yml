## Reference: https://github.com/helm/chart-testing-action
name: Linting and Testing
on: pull_request

permissions:
  contents: read

jobs:
  linter-artifacthub:
    runs-on: ubuntu-latest
    container:
      image: public.ecr.aws/artifacthub/ah:v1.22.0@sha256:ffdb21cf1bbcea79c10a5f702eace08f841ff635e96c849594c338a048652b6b
      options: --user 1001
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check charts directory
        id: check-charts
        run: |
          if [ -d "charts" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run ah lint
        if: steps.check-charts.outputs.exists == 'true'
        working-directory: ./charts
        run: ah lint

  chart-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.13.3 # Also update in publish.yaml

      - name: Set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.9

      - name: Setup Chart Linting
        id: lint
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          # Note: Also update in scripts/lint.sh
          version: v3.11.0

      - name: List changed charts
        id: list-changed
        run: |
          ## If executed with debug this won't work anymore.
          changed=$(ct --config ./.github/configs/ct-lint.yaml list-changed)
          charts=$(echo "$changed" | tr '\n' ' ' | xargs)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "changed_charts=$charts" >> $GITHUB_OUTPUT
          fi

      - name: Run chart-testing (lint)
        run: ct lint --debug --config ./.github/configs/ct-lint.yaml --lint-conf ./.github/configs/lintconf.yaml

      - name: Verify chart dependencies
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          cd charts/kubeadapt
          helm dependency build
          if [ $(find charts/ -name "ebpf-agent-*.tgz" | wc -l) -eq 0 ]; then
            echo "Dependencies not correctly resolved"
            echo "Expected to find ebpf-agent-*.tgz in charts directory"
            ls -la charts/
            exit 1
          fi
          echo "Found dependencies:"
          ls -la charts/

      - name: Run docs-testing (helm-docs)
        id: helm-docs
        run: |
          ./scripts/helm-docs.sh
          if [[ $(git diff --stat) != '' ]]; then
            echo -e '\033[0;31mDocumentation outdated!\033[0m ❌'
            git diff --color
            exit 1
          else
            echo -e '\033[0;32mDocumentation up to date\033[0m ✔'
          fi

      # Ensure BPF filesystem is mounted (required for eBPF agent)
      - name: Setup BPF filesystem
        if: steps.list-changed.outputs.changed == 'true' && contains(steps.list-changed.outputs.changed_charts, 'ebpf-agent')
        run: |
          # Check if bpf filesystem is mounted
          if ! mount | grep -q "type bpf"; then
            echo "Mounting BPF filesystem..."
            sudo mount -t bpf bpf /sys/fs/bpf || true
          fi
          echo "BPF filesystem status:"
          mount | grep bpf || echo "BPF not mounted (may be built-in)"
          ls -la /sys/fs/bpf/ || echo "/sys/fs/bpf not accessible"

      # Only create cluster if all previous steps pass
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        if: steps.list-changed.outputs.changed == 'true'
        with:
          config: .github/configs/kind-config.yaml

      - name: Test chart installation (dry-run)
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          # Test with default values
          helm install kubeadapt-test ./charts/kubeadapt \
            --set agent.config.token=ci-test-key \
            --dry-run

          # Test with eBPF agent enabled
          helm install kubeadapt-test-ebpf ./charts/kubeadapt \
            --set agent.config.token=ci-test-key \
            --set ebpf-agent.enabled=true \
            --dry-run

          # Test template rendering
          helm template ./charts/kubeadapt \
            --set agent.config.token=ci-test-key \
            | kubectl apply --dry-run=client -f -

      - name: Run chart-testing (install)
        run: ct install --config ./.github/configs/ct-install.yaml
        if: steps.list-changed.outputs.changed == 'true'
